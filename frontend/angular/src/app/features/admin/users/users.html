<h1>Crear usuario</h1>

<form [formGroup]="form" (ngSubmit)="createUser()">
    <input placeholder="Usuario" formControlName="username">
    <input type="password" placeholder="Contraseña" formControlName="password">
    <input placeholder="Nombre" formControlName="first_name">
    <input placeholder="Apellido" formControlName="last_name">
    
    <select formControlName="rol">
        <option value="MOZO">Mozo</option>
        <option value="COCINERO">Cocinero</option>
    </select>

    <button type="submit" [disabled]="loading">
        {{ loading ? 'Creando...' : 'Crear usuario' }}
    </button>
</form>

<p>{{ success }}</p>
<p>{{ error }}</p>
