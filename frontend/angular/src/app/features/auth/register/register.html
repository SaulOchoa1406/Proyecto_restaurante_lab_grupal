<div class="container">

    <h1>Registro</h1>

    <form [formGroup]="form" (ngSubmit)="registrar()">

        <input placeholder="Usuario" formControlName="username">

        <br><br>

        <input type="password" placeholder="Contraseña" formControlName="password">

        <br><br>

        <input placeholder="Nombre" formControlName="first_name">

        <br><br>

        <input placeholder="Apellido" formControlName="last_name">

        <br><br>

        <button>Crear cuenta</button>

    </form>

    <br>

    <a routerLink="/login">Volver</a>

</div>
